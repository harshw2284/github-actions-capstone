name: Code Quality

on:
  workflow_call:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set-up Python
        uses: actions/setup-python@v5
        with: 
           python-version: 3.13

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Linter
        run: flake8 app.py

      - name: Run SAST
        run: bandit -r app.py
      
