name: Main Pipeline

on:
    push:
        branches:
            - main

jobs:
    reusable-build:
        uses: ./.github/workflows/reusable-build.yml
        with:
            python_version: 3.13
            run_test: true

    reusable-docker:
        needs: [reusable-build]
        uses: ./.github/workflows/reusable-docker.yml
        with: 
            image_name: flask-app
            tag: ${{github.sha}}
        secrets: 
            DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
            DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

    Image-scan:
        needs: [reusable-docker]
        runs-on: ubuntu-latest
        steps:
            - name: Scan Docker Image for Vulnerabilities
              uses: aquasecurity/trivy-action@master
              with:
                image-ref: 'harsh9301/flask-app:711f30f7f4fa8869b090f2af5e294051441733d9'
                format: 'table'
                exit-code: '1'
                severity: 'CRITICAL,HIGH'

    deploy:
        needs: [Image-scan]
        runs-on: ubuntu-latest

        environment:
            name: production

        steps:
            - name: Print
              run: echo "Deploying image ${{ needs.reusable-docker.outputs.image_url }} to production"




    
