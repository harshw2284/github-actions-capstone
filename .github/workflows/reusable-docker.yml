name: Docker Build and Push

on:
    workflow_call:
        inputs:
            image_name:
                description: name of image
                required: true
                type: string
            
            tag:
                description: Name of Tag
                required: false
                type: string

        secrets:
            DOCKERHUB_TOKEN:
                required: true

            DOCKERHUB_USERNAME:
                required: true
        
        outputs:
            image_url:
              description: "Full Docker image URL"
              value: ${{ jobs.build-push.outputs.image_url }}


jobs:
    build-push:
        runs-on: ubuntu-latest

        outputs:
          image_url: ${{ steps.image.outputs.image_url }}
          
        steps: 
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Login Docker hub
              uses: docker/login-action@v3
              with: 
                username: ${{ vars.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Build and push
              uses: docker/build-push-action@v6
              with:
                context: .
                push: true
                tags: ${{ vars.DOCKERHUB_USERNAME }}/${{inputs.image_name}}:${{inputs.tag}}
                
            - name: Set Image URL output
              id: image
              run: echo "image_url=${{ vars.DOCKERHUB_USERNAME }}/${{inputs.image_name}}:${{inputs.tag}}" >> "$GITHUB_OUTPUT"