name: Dependency Scan

on:
    workflow_call


jobs:
    deoendency-check:

      runs-on: ubuntu-latest
      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Set-up Python
          uses: actions/setup-python@v5
          with:
            python-version: 3.13
        
        - name: Install Pip audit
          run: pip install pip-audit
        
        - name: Audit Dependencies
          run: pip-audit -r requirements.txt