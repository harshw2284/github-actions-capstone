name: PR pipeline

on:
    pull_request:
        branches: [main]
        types:
            - opened
            - synchronize


jobs:
    reusable-build:
        uses: ./.github/workflows/reusable-build.yml
        with:
            python_version: 3.13
            run_test: true

    dependency-scan:
        needs: [reusable-build]
        runs-on: ubuntu-latest
        steps:    
            - name: Check Dependencies for Vulnerabilities
              uses: actions/dependency-review-action@v4
              with:
                fail-on-severity: critical

    pr-comment:
        runs-on: ubuntu-latest
        needs: [dependency-scan]
        steps:
            - name: print summary
              run: echo "PR checks passed for branch is ${{ github.head_ref }}"
