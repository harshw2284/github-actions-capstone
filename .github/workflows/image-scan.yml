name: Image Scanner

on:
    workflow_call:

jobs:
    image-scan:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
              
            - name: Docker Login
              uses: docker/login-action@v3
              with:
                username: ${{ vars.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Update Trivy
              run: |
                sudo apt-get update && sudo apt-get --only-upgrade install perl

            - name: Trivy Scanner
              uses: aquasecurity/trivy-action@v0.36.0
              with: 
                image-ref: ${{vars.DOCKERHUB_USERNAME}}/github-actions-app:latest
                severity: 'CRITICAL'
                exit-code: '1'
              