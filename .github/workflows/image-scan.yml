name: Image Scanner

on:
    workflow_call:
        inputs:
            image_name:
                description: name of image
                required: true
                type: string
            
            tag:
                description: Name of Tag
                required: false
                type: string

jobs:
    image-scan:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
              
            - name: Docker Login
              uses: docker/login-action@v3
              with:
                username: ${{ vars.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Trivy Scanner
              uses: aquasecurity/trivy-action@v0.36.0
              with: 
                image-ref: '${{ vars.DOCKERHUB_USERNAME }}/${{inputs.image_name}}:${{inputs.tag}}'
                format: 'table'
                severity: 'CRITICAL'
                exit-code: '1'
              